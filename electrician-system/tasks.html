    <input type="text" id="tname" placeholder="Task Name">
    <input type="text" id="telectrician" placeholder="Electrician Name">

    <select id="tstatus">
        <option>Pending</option>

    </select>

    <button onclick="addTask()">Add Task</button>

    <!-- TASK TABLE -->
    <h3>Task List</h3>

    <table id="taskTable">
        <tr>
            <th>Task</th>
            <th>Electrician</th>
            <th>Status</th>
            <th>Action</th>
        </tr>

        <tr>
            <td>Fix Light</td>
