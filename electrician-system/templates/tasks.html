<!DOCTYPE html>
<html>
<head>
    <title>Tasks</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="sidebar">
    <h2>ECMS</h2>
    <a href="/dashboard">Dashboard</a>
    <a href="/electricians">Electricians</a>
    <a href="/jobs">Jobs</a>
    <a href="/tasks">Tasks</a>
    <a href="/materials">Materials</a>
    <a href="/profile">Profile</a>
</div>

<div class="main">
    <h2>Task Management</h2>

    <!-- ✅ FORM -->
    <form method="POST">
        <input type="text" name="name" placeholder="Task Name" required>
        <input type="text" name="electrician" placeholder="Electrician Name" required>

        <select name="status">
            <option>Pending</option>
            <option>In Progress</option>
            <option>Completed</option>
        </select>

        <button type="submit">Add Task</button>
    </form>

    <!-- ✅ TABLE -->
    <h3>Task List</h3>
    <table>
        <tr>
            <th>Task</th>
            <th>Electrician</th>
            <th>Status</th>
        </tr>

        {% for t in data %}
        <tr>
            <td>{{ t['name'] }}</td>
            <td>{{ t['electrician'] }}</td>
            <td>{{ t['status'] }}</td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
